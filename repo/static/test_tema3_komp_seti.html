<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест: Компьютерные сети. Организация компьютерных сетей</title>
<style>
  :root {
    --primary: #E4E6EC;
    --accent: #2DD4BF;
    --pop: #FF7A93;
    --correct: #2DD4BF;
    --wrong: #FF7A93;
    --bg: #0F1117;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 0;
    color: #DDE1E8;
  }
  header {
    background: #171A24;
    color: #F2F4F8;
    padding: 24px 20px;
    text-align: center;
    border-bottom: 3px solid #2DD4BF;
  }
  header h1 { margin: 0 0 6px 0; font-size: 1.3rem; }
  header p { margin: 0; opacity: 0.85; font-size: 0.9rem; font-family: 'DejaVu Sans Mono', monospace; }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  .progress-wrap {
    background: #171A24;
    border: 1.5px solid #262A38;
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 20px;
    position: sticky;
    top: 10px;
    z-index: 10;
    color: #C3C8D4;
  }
  .progress-bar-bg {
    background: #262A38;
    border-radius: 6px;
    height: 8px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-bar {
    background: var(--accent);
    height: 100%;
    width: 0%;
    transition: width 0.3s;
  }
  .question {
    background: #171A24;
    border: 1.5px solid #262A38;
    border-left: 3px solid #8C7CFF;
    border-radius: 4px;
    padding: 16px 18px;
    margin-bottom: 14px;
    color: #DDE1E8;
  }
  .qtext {
    font-weight: 600;
    margin-bottom: 10px;
    font-size: 1rem;
  }
  .qnum {
    color: var(--accent);
    margin-right: 6px;
  }
  .multi-hint {
    font-size: 0.78rem;
    color: #7A8093;
    font-weight: normal;
    display: block;
    margin-top: 2px;
  }
  .option {
    display: block;
    padding: 10px 12px;
    margin-bottom: 8px;
    border: 1.5px solid #262A38;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.95rem;
    color: #DDE1E8;
  }
  .option:hover { border-color: var(--accent); background: #10221E; }
  .option.selected {
    border-color: #8C7CFF;
    background: #1B1A33;
    font-weight: 600;
  }
  .option.correct {
    border-color: var(--correct);
    background: #10221E;
    color: #DDE1E8;
  }
  .option.wrong {
    border-color: var(--wrong);
    background: #2A1418;
    color: #DDE1E8;
  }
  .option input { margin-right: 8px; }
  #submitBtn {
    display: block;
    width: 100%;
    background: #2DD4BF;
    color: #0F1117;
    border: none;
    padding: 14px;
    font-size: 1.05rem;
    font-family: 'DejaVu Sans Mono', monospace;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 10px;
    font-weight: bold;
  }
  #submitBtn:hover { background: #5CE6D5; }
  #submitBtn:disabled { background: #33384A; color: #7A8093; cursor: not-allowed; }
  #resultBox {
    display: none;
    background: #171A24;
    border: 1.5px solid #262A38;
    border-radius: 6px;
    padding: 24px 20px;
    text-align: center;
    margin-bottom: 20px;
  }
  #resultBox h2 { color: var(--primary); margin-top: 0; }
  #scoreCircle {
    font-size: 2.2rem;
    font-weight: 800;
    color: #2DD4BF;
    font-family: 'DejaVu Sans Mono', monospace;
  }
  #retryBtn {
    background: #2DD4BF;
    color: #0F1117;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
    font-size: 0.95rem;
    font-weight: bold;
  }
  .explain {
    font-size: 0.85rem;
    color: #A7ADBB;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed #33384A;
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>Компьютерные сети. Организация компьютерных сетей</h1>
  <p>Тест по информатике &middot; 11 класс &middot; подготовка к ЕНТ</p>
  <p style="margin-top:4px; font-size:0.78rem; letter-spacing:1px; text-transform:uppercase; opacity:0.8;">by Azamat</p>
</header>

<div class="container">

  <div class="progress-wrap">
    <div style="display:flex; justify-content:space-between; font-size:0.85rem; color:#555;">
      <span>Отвечено: <span id="answeredCount">0</span> из <span id="totalCount">0</span></span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <div id="resultBox">
    <h2>Результат теста</h2>
    <div id="scoreCircle">0 / 0</div>
    <p id="scoreMsg"></p>
    <button id="retryBtn" onclick="resetQuiz()">Пройти заново</button>
  </div>

  <div id="quizForm"></div>

  <button id="submitBtn" onclick="checkAnswers()">Проверить ответы</button>

</div>

<script src="progress.js"></script>
<script>
const questions = [
  {
    q: "Сеть, ограниченная одним зданием или предприятием:",
    options: ["WAN", "LAN", "MAN", "PAN"],
    correct: [1],
    explain: "LAN (Local Area Network) - локальная сеть в пределах одного здания или предприятия."
  },
  {
    q: "Глобальная сеть, объединяющая компьютеры по всему миру:",
    options: ["LAN", "WAN", "MAN", "PAN"],
    correct: [1],
    explain: "WAN (Wide Area Network) - глобальная сеть, пример: Интернет."
  },
  {
    q: "Кабель, использующий свет для передачи данных, скорость более 10 Гбит/с:",
    options: ["витая пара", "коаксиальный", "оптоволоконный", "телефонный"],
    correct: [2],
    explain: "Оптоволоконный кабель передаёт данные светом и обеспечивает самую высокую скорость."
  },
  {
    q: "Топология, в которой все узлы подключены к одному общему каналу:",
    options: ["кольцо", "звезда", "шина", "дерево"],
    correct: [2],
    explain: "Топология «шина» - все узлы подключены к одному линейному информационному каналу."
  },
  {
    q: "Топология, где все узлы соединены одним центральным узлом:",
    options: ["шина", "звезда", "кольцо", "смешанная"],
    correct: [1],
    explain: "Звездообразная топология: все узлы соединены с одним центральным узлом."
  },
  {
    q: "Формула для расчёта объёма переданной информации:",
    options: ["V = q / t", "V = q × t", "V = t / q", "V = q + t"],
    correct: [1],
    explain: "V = q × t, где q - пропускная способность сети, t - время передачи."
  },
  {
    q: "Какой объём можно передать за 4 секунды со скоростью 10 Кбит/с?",
    options: ["40 бит", "40 Кбит", "2,5 Кбит", "400 бит"],
    correct: [1],
    explain: "V = q × t = 10 Кбит/с × 4 с = 40 Кбит."
  },
  {
    q: "Облако, доступное свободно всем пользователям интернета:",
    options: ["частное", "публичное", "общественное", "гибридное"],
    correct: [1],
    explain: "Публичное облако (public cloud) доступно всем пользователям с доступом к интернету."
  },
  {
    q: "Сервис для хранения файлов и совместной работы от Google:",
    options: ["Google Диск", "Google Maps", "Google Chrome", "Google Photos"],
    correct: [0],
    explain: "Google Диск - бесплатный сервис для хранения файлов и совместной работы."
  },
  {
    q: "Компонент сети, который хранит и распространяет информацию, обслуживая клиентов:",
    options: ["клиент", "сервер", "модем", "кабель"],
    correct: [1],
    explain: "Сервер хранит, обрабатывает и распространяет информацию по запросам клиентов."
  },
  {
    q: "Устройство, отправляющее пакет только конкретному адресату, а не всем подряд:",
    options: ["концентратор (хаб)", "коммутатор (switch)", "модем", "сервер"],
    correct: [1],
    explain: "Коммутатор отправляет пакет на адрес нужного компьютера, а не рассылает всем."
  },
  {
    q: "Устройство, соединяющее разные сети и направляющее трафик по IP-адресам:",
    options: ["концентратор", "коммутатор", "маршрутизатор", "сервер"],
    correct: [2],
    explain: "Маршрутизатор (роутер) соединяет сети и направляет трафик по IP-адресам назначения."
  },
  {
    q: "Сколько октетов (чисел) содержит IPv4-адрес?",
    options: ["2", "3", "4", "8"],
    correct: [2],
    explain: "IPv4-адрес состоит из 4 чисел (октетов), например 192.168.1.38."
  },
  {
    q: "Максимальное значение одного октета IPv4-адреса:",
    options: ["128", "255", "256", "999"],
    correct: [1],
    explain: "Каждый октет занимает 1 байт, максимум 255 (8 единиц в двоичной системе)."
  },
  {
    q: "IP-адрес, который остаётся неизменным, называется:",
    options: ["динамический", "статический", "локальный", "публичный"],
    correct: [1],
    explain: "Статический IP-адрес остаётся постоянным, в отличие от динамического."
  },
  {
    q: "Диапазон адресов, относящийся к внутренним (локальным) IP:",
    options: ["8.8.8.8", "192.168.x.x", "1.1.1.1", "100.100.1.1"],
    correct: [1],
    explain: "192.168.x.x - один из стандартных диапазонов внутренних (локальных) IP-адресов."
  },
  {
    q: "Что переводит доменное имя сайта в IP-адрес?",
    options: ["DNS", "HTTP", "FTP", "SSL"],
    correct: [0],
    explain: "DNS (Domain Name System) переводит удобное для человека имя сайта в IP-адрес."
  },
  {
    q: "Домен первого уровня в адресе zeinacademy.kz:",
    options: ["zein", "academy", "kz", "www"],
    correct: [2],
    explain: "Домен первого уровня - часть справа от последней точки, то есть .kz."
  },
  {
    q: "Типы сетей по территориальной распространённости (выберите все верные):",
    options: ["LAN", "WAN", "MAN", "PAN", "DNS"],
    correct: [0,1,2,3],
    explain: "LAN, WAN, MAN, PAN - типы сетей по территориальному признаку. DNS - система доменных имён, а не тип сети.",
    multi: true
  },
  {
    q: "Виды облачных технологий (выберите все верные):",
    options: ["частное", "публичное", "общественное", "гибридное", "локальное"],
    correct: [0,1,2,3],
    explain: "Четыре вида облаков: частное, публичное, общественное, гибридное. «Локальное» не является отдельным видом облака.",
    multi: true
  }
];const form = document.getElementById('quizForm');
const totalCountEl = document.getElementById('totalCount');
totalCountEl.textContent = questions.length;

function renderQuiz() {
  form.innerHTML = '';
  questions.forEach((item, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.dataset.qi = qi;
    const letters = ['A','B','C','D','E','F'];
    let optsHtml = '';
    item.options.forEach((opt, oi) => {
      const inputType = item.multi ? 'checkbox' : 'radio';
      optsHtml += `<label class="option" data-oi="${oi}">
        <input type="${inputType}" name="q${qi}" value="${oi}" onchange="selectOption(${qi}, ${oi}, this)">
        ${letters[oi]}) ${opt}
      </label>`;
    });
    div.innerHTML = `
      <div class="qtext"><span class="qnum">${qi+1}.</span>${item.q}
        ${item.multi ? '<span class="multi-hint">(несколько верных ответов)</span>' : ''}
      </div>
      ${optsHtml}
      <div class="explain" id="explain${qi}">${item.explain}</div>
    `;
    form.appendChild(div);
  });
}

const userAnswers = {};

function selectOption(qi, oi, inputEl) {
  const qDiv = form.querySelector(`[data-qi="${qi}"]`);
  const isMulti = questions[qi].multi;
  if (!userAnswers[qi]) userAnswers[qi] = new Set();

  if (isMulti) {
    if (inputEl.checked) userAnswers[qi].add(oi);
    else userAnswers[qi].delete(oi);
    if (userAnswers[qi].size === 0) delete userAnswers[qi];
  } else {
    userAnswers[qi] = new Set([oi]);
  }

  qDiv.querySelectorAll('.option').forEach(optLabel => {
    const optOi = parseInt(optLabel.dataset.oi);
    const input = optLabel.querySelector('input');
    optLabel.classList.toggle('selected', input.checked);
  });

  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(userAnswers).length;
  document.getElementById('answeredCount').textContent = answered;
  const pct = Math.round((answered / questions.length) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
}

function checkAnswers() {
  let score = 0;
  questions.forEach((item, qi) => {
    const qDiv = form.querySelector(`[data-qi="${qi}"]`);
    const userSet = userAnswers[qi] || new Set();
    const correctSet = new Set(item.correct);
    const isCorrect = userSet.size === correctSet.size && [...userSet].every(v => correctSet.has(v));
    if (isCorrect) score++;

    qDiv.querySelectorAll('.option').forEach(optLabel => {
      const oi = parseInt(optLabel.dataset.oi);
      const input = optLabel.querySelector('input');
      input.disabled = true;
      if (correctSet.has(oi)) optLabel.classList.add('correct');
      else if (userSet.has(oi)) optLabel.classList.add('wrong');
    });
    document.getElementById('explain' + qi).style.display = 'block';
  });

  document.getElementById('submitBtn').style.display = 'none';
  const resultBox = document.getElementById('resultBox');
  resultBox.style.display = 'block';
  document.getElementById('scoreCircle').textContent = score + ' / ' + questions.length;
  const pct = Math.round((score / questions.length) * 100);
  let msg = '';
  if (pct >= 85) msg = 'Отличный результат! Тема усвоена.';
  else if (pct >= 60) msg = 'Хороший результат, но стоит повторить некоторые вопросы.';
  else msg = 'Рекомендуется повторить тему и пройти тест ещё раз.';
  const saved = (typeof EduConProgress !== 'undefined')
    ? EduConProgress.recordResult('tema3', 'Компьютерные сети. Организация компьютерных сетей', score, questions.length)
    : null;
  let bestMsg = '';
  if (saved && saved.isNewBest) bestMsg = ' \uD83C\uDFC6 Новый личный рекорд!';
  document.getElementById('scoreMsg').textContent = msg + ` (${pct}%)` + bestMsg;
  resultBox.scrollIntoView({behavior: 'smooth'});
}

function resetQuiz() {
  for (const key in userAnswers) delete userAnswers[key];
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('submitBtn').style.display = 'block';
  updateProgress();
  renderQuiz();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

renderQuiz();
if (typeof EduConProgress !== 'undefined') { EduConProgress.ensureNickname(); }
</script>

</body>
</html>
