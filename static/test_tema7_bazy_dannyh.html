<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест: База данных</title>
<style>
  :root {
    --primary: #E4E6EC;
    --accent: #2DD4BF;
    --pop: #FF7A93;
    --correct: #2DD4BF;
    --wrong: #FF7A93;
    --bg: #0F1117;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 0;
    color: #DDE1E8;
  }
  header {
    background: #171A24;
    color: #F2F4F8;
    padding: 24px 20px;
    text-align: center;
    border-bottom: 3px solid #2DD4BF;
  }
  header h1 { margin: 0 0 6px 0; font-size: 1.3rem; }
  header p { margin: 0; opacity: 0.85; font-size: 0.9rem; font-family: 'DejaVu Sans Mono', monospace; }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  .progress-wrap {
    background: #171A24;
    border: 1.5px solid #262A38;
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 20px;
    position: sticky;
    top: 10px;
    z-index: 10;
    color: #C3C8D4;
  }
  .progress-bar-bg {
    background: #262A38;
    border-radius: 6px;
    height: 8px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-bar {
    background: var(--accent);
    height: 100%;
    width: 0%;
    transition: width 0.3s;
  }
  .question {
    background: #171A24;
    border: 1.5px solid #262A38;
    border-left: 3px solid #8C7CFF;
    border-radius: 4px;
    padding: 16px 18px;
    margin-bottom: 14px;
    color: #DDE1E8;
  }
  .qtext {
    font-weight: 600;
    margin-bottom: 10px;
    font-size: 1rem;
  }
  .qnum {
    color: var(--accent);
    margin-right: 6px;
  }
  .multi-hint {
    font-size: 0.78rem;
    color: #7A8093;
    font-weight: normal;
    display: block;
    margin-top: 2px;
  }
  .option {
    display: block;
    padding: 10px 12px;
    margin-bottom: 8px;
    border: 1.5px solid #262A38;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.95rem;
    color: #DDE1E8;
  }
  .option:hover { border-color: var(--accent); background: #10221E; }
  .option.selected {
    border-color: #8C7CFF;
    background: #1B1A33;
    font-weight: 600;
  }
  .option.correct {
    border-color: var(--correct);
    background: #10221E;
    color: #DDE1E8;
  }
  .option.wrong {
    border-color: var(--wrong);
    background: #2A1418;
    color: #DDE1E8;
  }
  .option input { margin-right: 8px; }
  #submitBtn {
    display: block;
    width: 100%;
    background: #2DD4BF;
    color: #0F1117;
    border: none;
    padding: 14px;
    font-size: 1.05rem;
    font-family: 'DejaVu Sans Mono', monospace;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 10px;
    font-weight: bold;
  }
  #submitBtn:hover { background: #5CE6D5; }
  #submitBtn:disabled { background: #33384A; color: #7A8093; cursor: not-allowed; }
  #resultBox {
    display: none;
    background: #171A24;
    border: 1.5px solid #262A38;
    border-radius: 6px;
    padding: 24px 20px;
    text-align: center;
    margin-bottom: 20px;
  }
  #resultBox h2 { color: var(--primary); margin-top: 0; }
  #scoreCircle {
    font-size: 2.2rem;
    font-weight: 800;
    color: #2DD4BF;
    font-family: 'DejaVu Sans Mono', monospace;
  }
  #retryBtn {
    background: #2DD4BF;
    color: #0F1117;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
    font-size: 0.95rem;
    font-weight: bold;
  }
  .explain {
    font-size: 0.85rem;
    color: #A7ADBB;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed #33384A;
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>База данных</h1>
  <p>Тест по информатике &middot; 11 класс &middot; подготовка к ЕНТ</p>
  <p style="margin-top:4px; font-size:0.78rem; letter-spacing:1px; text-transform:uppercase; opacity:0.8;">by Azamat</p>
</header>

<div class="container">

  <div class="progress-wrap">
    <div style="display:flex; justify-content:space-between; font-size:0.85rem; color:#555;">
      <span>Отвечено: <span id="answeredCount">0</span> из <span id="totalCount">0</span></span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <div id="resultBox">
    <h2>Результат теста</h2>
    <div id="scoreCircle">0 / 0</div>
    <p id="scoreMsg"></p>
    <button id="retryBtn" onclick="resetQuiz()">Пройти заново</button>
  </div>

  <div id="quizForm"></div>

  <button id="submitBtn" onclick="checkAnswers()">Проверить ответы</button>

</div>

<script src="progress.js"></script>
<script>
const questions = [
  {
    q: "Как называются столбцы таблицы реляционной БД?",
    options: ["записи", "поля", "индексы", "ключи"],
    correct: [1],
    explain: "Столбцы реляционной таблицы называются полями."
  },
  {
    q: "Как называются строки таблицы реляционной БД?",
    options: ["поля", "индексы", "записи", "домены"],
    correct: [2],
    explain: "Строки реляционной таблицы называются записями."
  },
  {
    q: "Тип базы данных, представляющей данные в виде таблиц:",
    options: ["иерархическая", "сетевая", "реляционная", "объектная"],
    correct: [2],
    explain: "Реляционная БД представляет данные в виде таблиц, это самый распространённый тип."
  },
  {
    q: "База данных, построенная по принципу древовидной структуры:",
    options: ["реляционная", "иерархическая", "сетевая", "SQL-база"],
    correct: [1],
    explain: "Иерархическая БД строится по принципу дерева: один объект главный, остальные подчинённые."
  },
  {
    q: "Поле или набор полей, однозначно определяющих каждую запись:",
    options: ["индекс", "внешний ключ", "первичный ключ", "домен"],
    correct: [2],
    explain: "Первичный ключ однозначно определяет каждую запись в таблице."
  },
  {
    q: "Вспомогательная таблица для ускорения поиска:",
    options: ["индекс", "отчёт", "форма", "макрос"],
    correct: [0],
    explain: "Индекс - вспомогательная таблица, ускоряющая поиск в основной таблице."
  },
  {
    q: "Сколько объектов доступно в Microsoft Access?",
    options: ["4", "5", "6", "7"],
    correct: [3],
    explain: "В Access семь объектов: таблица, запрос, форма, отчёт, макрос, модуль, страницы."
  },
  {
    q: "Числовой тип данных с плавающей точкой:",
    options: ["INT", "FLOAT", "CHAR", "DATE"],
    correct: [1],
    explain: "FLOAT хранит числа с плавающей точкой (дробные)."
  },
  {
    q: "Текстовый тип данных фиксированной длины:",
    options: ["VARCHAR", "CHAR", "FLOAT", "TIME"],
    correct: [1],
    explain: "CHAR(n) - текстовое поле фиксированной длины."
  },
  {
    q: "Язык структурированных запросов для управления БД:",
    options: ["HTML", "CSS", "SQL", "DNS"],
    correct: [2],
    explain: "SQL (Structured Query Language) - язык для управления реляционными базами данных."
  },
  {
    q: "Команда SQL, определяющая, какие поля вывести:",
    options: ["FROM", "WHERE", "SELECT", "ORDER BY"],
    correct: [2],
    explain: "SELECT указывает, какие поля нужно вывести в результате запроса."
  },
  {
    q: "Команда SQL, задающая условие отбора записей:",
    options: ["SELECT", "WHERE", "FROM", "DELETE"],
    correct: [1],
    explain: "WHERE задаёт условие, которому должны соответствовать отбираемые записи."
  },
  {
    q: "Команда SQL для сортировки результатов:",
    options: ["SORT BY", "GROUP BY", "ORDER BY", "FILTER BY"],
    correct: [2],
    explain: "ORDER BY определяет порядок сортировки результата запроса."
  },
  {
    q: "Значение ORDER BY для сортировки по убыванию:",
    options: ["ASC", "DESC", "DOWN", "MIN"],
    correct: [1],
    explain: "DESC сортирует по убыванию, ASC - по возрастанию."
  },
  {
    q: "Команда для добавления новой записи в таблицу:",
    options: ["SELECT", "DELETE", "INSERT INTO", "UPDATE"],
    correct: [2],
    explain: "INSERT INTO добавляет новую запись (строку) в таблицу."
  },
  {
    q: "Команда для удаления записи из таблицы:",
    options: ["DROP", "DELETE FROM", "REMOVE", "CLEAR"],
    correct: [1],
    explain: "DELETE FROM удаляет запись(и) из таблицы по заданному условию."
  },
  {
    q: "Символ * в запросе SELECT * FROM Students означает:",
    options: ["первую запись", "все поля таблицы", "первичный ключ", "ошибку запроса"],
    correct: [1],
    explain: "Звёздочка * означает выбор всех полей таблицы."
  },
  {
    q: "СУБД, являющаяся реляционной:",
    options: ["MySQL", "HTML", "CSS", "DNS"],
    correct: [0],
    explain: "MySQL - популярная система управления реляционными базами данных."
  },
  {
    q: "Обязательные команды в запросе SELECT (выберите все верные):",
    options: ["SELECT", "FROM", "WHERE", "ORDER BY", "GROUP BY"],
    correct: [0,1],
    explain: "Обязательны только SELECT и FROM. WHERE, ORDER BY и GROUP BY необязательны.",
    multi: true
  },
  {
    q: "Типы баз данных по способу организации связи (выберите все верные):",
    options: ["иерархическая", "сетевая", "реляционная", "облачная", "векторная"],
    correct: [0,1,2],
    explain: "Три типа по организации связи: иерархическая, сетевая, реляционная. Облачная и векторная сюда не относятся.",
    multi: true
  }
];
const form = document.getElementById('quizForm');
const totalCountEl = document.getElementById('totalCount');
totalCountEl.textContent = questions.length;

function renderQuiz() {
  form.innerHTML = '';
  questions.forEach((item, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.dataset.qi = qi;
    const letters = ['A','B','C','D','E','F'];
    let optsHtml = '';
    item.options.forEach((opt, oi) => {
      const inputType = item.multi ? 'checkbox' : 'radio';
      optsHtml += `<label class="option" data-oi="${oi}">
        <input type="${inputType}" name="q${qi}" value="${oi}" onchange="selectOption(${qi}, ${oi}, this)">
        ${letters[oi]}) ${opt}
      </label>`;
    });
    div.innerHTML = `
      <div class="qtext"><span class="qnum">${qi+1}.</span>${item.q}
        ${item.multi ? '<span class="multi-hint">(несколько верных ответов)</span>' : ''}
      </div>
      ${optsHtml}
      <div class="explain" id="explain${qi}">${item.explain}</div>
    `;
    form.appendChild(div);
  });
}

const userAnswers = {};

function selectOption(qi, oi, inputEl) {
  const qDiv = form.querySelector(`[data-qi="${qi}"]`);
  const isMulti = questions[qi].multi;
  if (!userAnswers[qi]) userAnswers[qi] = new Set();

  if (isMulti) {
    if (inputEl.checked) userAnswers[qi].add(oi);
    else userAnswers[qi].delete(oi);
    if (userAnswers[qi].size === 0) delete userAnswers[qi];
  } else {
    userAnswers[qi] = new Set([oi]);
  }

  qDiv.querySelectorAll('.option').forEach(optLabel => {
    const optOi = parseInt(optLabel.dataset.oi);
    const input = optLabel.querySelector('input');
    optLabel.classList.toggle('selected', input.checked);
  });

  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(userAnswers).length;
  document.getElementById('answeredCount').textContent = answered;
  const pct = Math.round((answered / questions.length) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
}

function checkAnswers() {
  let score = 0;
  questions.forEach((item, qi) => {
    const qDiv = form.querySelector(`[data-qi="${qi}"]`);
    const userSet = userAnswers[qi] || new Set();
    const correctSet = new Set(item.correct);
    const isCorrect = userSet.size === correctSet.size && [...userSet].every(v => correctSet.has(v));
    if (isCorrect) score++;

    qDiv.querySelectorAll('.option').forEach(optLabel => {
      const oi = parseInt(optLabel.dataset.oi);
      const input = optLabel.querySelector('input');
      input.disabled = true;
      if (correctSet.has(oi)) optLabel.classList.add('correct');
      else if (userSet.has(oi)) optLabel.classList.add('wrong');
    });
    document.getElementById('explain' + qi).style.display = 'block';
  });

  document.getElementById('submitBtn').style.display = 'none';
  const resultBox = document.getElementById('resultBox');
  resultBox.style.display = 'block';
  document.getElementById('scoreCircle').textContent = score + ' / ' + questions.length;
  const pct = Math.round((score / questions.length) * 100);
  let msg = '';
  if (pct >= 85) msg = 'Отличный результат! Тема усвоена.';
  else if (pct >= 60) msg = 'Хороший результат, но стоит повторить некоторые вопросы.';
  else msg = 'Рекомендуется повторить тему и пройти тест ещё раз.';
  const saved = (typeof EduConProgress !== 'undefined')
    ? EduConProgress.recordResult('tema7', 'База данных', score, questions.length)
    : null;
  let bestMsg = '';
  if (saved && saved.isNewBest) bestMsg = ' \uD83C\uDFC6 Новый личный рекорд!';
  document.getElementById('scoreMsg').textContent = msg + ` (${pct}%)` + bestMsg;
  resultBox.scrollIntoView({behavior: 'smooth'});
}

function resetQuiz() {
  for (const key in userAnswers) delete userAnswers[key];
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('submitBtn').style.display = 'block';
  updateProgress();
  renderQuiz();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

renderQuiz();
if (typeof EduConProgress !== 'undefined') { EduConProgress.ensureNickname(); }
</script>

</body>
</html>
