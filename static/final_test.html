<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Итоговый тест: Информатика 11 класс (все темы)</title>
<style>
  :root {
    --primary: #E4E6EC;
    --accent: #2DD4BF;
    --pop: #FF7A93;
    --correct: #2DD4BF;
    --wrong: #FF7A93;
    --bg: #0F1117;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 0;
    color: #DDE1E8;
  }
  header {
    background: #171A24;
    color: #F2F4F8;
    padding: 24px 20px;
    text-align: center;
    border-bottom: 3px solid #2DD4BF;
  }
  header h1 { margin: 0 0 6px 0; font-size: 1.3rem; }
  header p { margin: 0; opacity: 0.85; font-size: 0.9rem; font-family: 'DejaVu Sans Mono', monospace; }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  .progress-wrap {
    background: #171A24;
    border: 1.5px solid #262A38;
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 20px;
    position: sticky;
    top: 10px;
    z-index: 10;
    color: #C3C8D4;
  }
  .progress-bar-bg {
    background: #262A38;
    border-radius: 6px;
    height: 8px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-bar {
    background: var(--accent);
    height: 100%;
    width: 0%;
    transition: width 0.3s;
  }
  .question {
    background: #171A24;
    border: 1.5px solid #262A38;
    border-left: 3px solid #8C7CFF;
    border-radius: 4px;
    padding: 16px 18px;
    margin-bottom: 14px;
    color: #DDE1E8;
  }
  .qtext {
    font-weight: 600;
    margin-bottom: 10px;
    font-size: 1rem;
  }
  .qnum {
    color: var(--accent);
    margin-right: 6px;
  }
  .multi-hint {
    font-size: 0.78rem;
    color: #7A8093;
    font-weight: normal;
    display: block;
    margin-top: 2px;
  }
  .topic-badge {
    display: inline-block;
    font-size: 0.68rem;
    font-family: 'DejaVu Sans Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: #1B1A33;
    color: #8C7CFF;
    padding: 2px 7px;
    border-radius: 3px;
    margin-right: 8px;
    vertical-align: middle;
  }
  .option {
    display: block;
    padding: 10px 12px;
    margin-bottom: 8px;
    border: 1.5px solid #262A38;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.95rem;
    color: #DDE1E8;
  }
  .option:hover { border-color: var(--accent); background: #10221E; }
  .option.selected {
    border-color: #8C7CFF;
    background: #1B1A33;
    font-weight: 600;
  }
  .option.correct {
    border-color: var(--correct);
    background: #10221E;
    color: #DDE1E8;
  }
  .option.wrong {
    border-color: var(--wrong);
    background: #2A1418;
    color: #DDE1E8;
  }
  .option input { margin-right: 8px; }
  #submitBtn {
    display: block;
    width: 100%;
    background: #2DD4BF;
    color: #0F1117;
    border: none;
    padding: 14px;
    font-size: 1.05rem;
    font-family: 'DejaVu Sans Mono', monospace;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 10px;
    font-weight: bold;
  }
  #submitBtn:hover { background: #5CE6D5; }
  #submitBtn:disabled { background: #33384A; color: #7A8093; cursor: not-allowed; }
  #resultBox {
    display: none;
    background: #171A24;
    border: 1.5px solid #262A38;
    border-radius: 6px;
    padding: 24px 20px;
    text-align: center;
    margin-bottom: 20px;
  }
  #resultBox h2 { color: var(--primary); margin-top: 0; }
  #scoreCircle {
    font-size: 2.2rem;
    font-weight: 800;
    color: #2DD4BF;
    font-family: 'DejaVu Sans Mono', monospace;
  }
  #retryBtn {
    background: #2DD4BF;
    color: #0F1117;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
    font-size: 0.95rem;
    font-weight: bold;
  }
  .explain {
    font-size: 0.85rem;
    color: #A7ADBB;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed #33384A;
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>Итоговый тест: все темы</h1>
  <p>Информатика &middot; 11 класс &middot; полное повторение перед ЕНТ</p>
  <p style="margin-top:4px; font-size:0.78rem; letter-spacing:1px; text-transform:uppercase; opacity:0.8;">by Azamat</p>
</header>

<div class="container">

  <div class="progress-wrap">
    <div style="display:flex; justify-content:space-between; font-size:0.85rem; color:#555;">
      <span>Отвечено: <span id="answeredCount">0</span> из <span id="totalCount">0</span></span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <div id="resultBox">
    <h2>Результат теста</h2>
    <div id="scoreCircle">0 / 0</div>
    <p id="scoreMsg"></p>
    <button id="retryBtn" onclick="resetQuiz()">Пройти заново</button>
  </div>

  <div id="quizForm"></div>

  <button id="submitBtn" onclick="checkAnswers()">Проверить ответы</button>

</div>

<script src="progress.js"></script>
<script>
const questions = [
  { topic: "Тема 1", q: "Как называется «мозг» компьютера, выполняющий все вычисления?", options: ["Жёсткий диск", "Процессор", "Видеокарта", "Блок питания"], correct: [1], explain: "Процессор (CPU) обрабатывает все вычисления в компьютере." },
  { topic: "Тема 1", q: "Какой вид памяти теряет данные при выключении компьютера?", options: ["Жёсткий диск", "Флеш-память", "ОЗУ (RAM)", "Оптический диск"], correct: [2], explain: "ОЗУ - энергозависимая память, данные сохраняются только пока включено питание." },
  { topic: "Тема 1", q: "Кто заложил архитектуру персонального компьютера в 1945 году?", options: ["Билл Гейтс", "Джон фон Нейман", "Стив Джобс", "Блез Паскаль"], correct: [1], explain: "Джон фон Нейман предложил архитектуру ЭВМ с УУ, АЛУ, памятью и устройствами ввода-вывода." },
  { topic: "Тема 1", q: "Базовая конфигурация персонального компьютера включает:", options: ["Системный блок, монитор, клавиатуру, мышь", "Только системный блок", "Монитор и принтер", "Клавиатуру и сканер"], correct: [0], explain: "Базовая конфигурация ПК - это системный блок, монитор, клавиатура и мышь." },

  { topic: "Тема 2", q: "Наименьшая единица измерения информации:", options: ["Байт", "Бит", "Килобайт", "Символ"], correct: [1], explain: "Бит (binary digit) - наименьшая единица измерения информации: 0 или 1." },
  { topic: "Тема 2", q: "Мощность алфавита 32. Каков информационный вес одного символа?", options: ["4 бита", "5 бит", "6 бит", "32 бита"], correct: [1], explain: "32 = 2^5, значит информационный вес символа равен 5 битам." },
  { topic: "Тема 2", q: "Кто считается основателем алгебры логики (булевой алгебры)?", options: ["Аристотель", "Джордж Буль", "Ральф Хартли", "Джон фон Нейман"], correct: [1], explain: "Джордж Буль в середине XIX века создал алгебру логики." },
  { topic: "Тема 2", q: "Число строк в таблице истинности для выражения с 3 переменными:", options: ["3", "6", "8", "9"], correct: [2], explain: "Число строк m = 2^n = 2^3 = 8." },

  { topic: "Тема 3", q: "Сеть, ограниченная одним зданием или предприятием:", options: ["WAN", "LAN", "MAN", "PAN"], correct: [1], explain: "LAN (Local Area Network) - локальная сеть в пределах одного здания." },
  { topic: "Тема 3", q: "Топология, где все узлы соединены одним центральным узлом:", options: ["шина", "звезда", "кольцо", "смешанная"], correct: [1], explain: "Звездообразная топология: все узлы соединены с одним центральным узлом." },
  { topic: "Тема 3", q: "Сколько октетов (чисел) содержит IPv4-адрес?", options: ["2", "3", "4", "8"], correct: [2], explain: "IPv4-адрес состоит из 4 чисел (октетов), например 192.168.1.38." },
  { topic: "Тема 3", q: "Что переводит доменное имя сайта в IP-адрес?", options: ["DNS", "HTTP", "FTP", "SSL"], correct: [0], explain: "DNS переводит удобное для человека имя сайта в IP-адрес." },

  { topic: "Тема 4", q: "Пересечение столбца и строки в таблице называется:", options: ["диапазон", "адрес", "ячейка", "формула"], correct: [2], explain: "Ячейка - это пересечение столбца и строки." },
  { topic: "Тема 4", q: "Символ, фиксирующий столбец или строку в ссылке:", options: ["%", "&", "$", "#"], correct: [2], explain: "Знак $ делает ссылку абсолютной." },
  { topic: "Тема 4", q: "Функция для нахождения суммы значений диапазона:", options: ["СРЗНАЧ", "СЧЁТ", "СУММ", "МАКС"], correct: [2], explain: "Функция СУММ(диапазон) суммирует все числа в указанном диапазоне." },
  { topic: "Тема 4", q: "Диаграмма, лучше всего подходящая для отображения долей от целого:", options: ["гистограмма", "круговая", "точечная", "график"], correct: [1], explain: "Круговая диаграмма показывает доли от общего целого." },

  { topic: "Тема 5", q: "Чему равно 25 // 7?", options: ["3", "4", "3.57", "25"], correct: [0], explain: "// - целочисленное деление: 25 // 7 = 3." },
  { topic: "Тема 5", q: "Цикл, который применяется, когда число повторов заранее известно:", options: ["while", "if", "for", "def"], correct: [2], explain: "for используется, когда известно количество итераций." },
  { topic: "Тема 5", q: "Обязательный элемент любой рекурсивной функции:", options: ["цикл for", "базовый случай (условие остановки)", "глобальная переменная", "массив"], correct: [1], explain: "Без базового случая рекурсия будет выполняться бесконечно." },
  { topic: "Тема 5", q: "В неориентированном графе линии, соединяющие вершины, называются:", options: ["дуги", "рёбра", "узлы", "ветви"], correct: [1], explain: "В неориентированном графе связи называются рёбрами." },

  { topic: "Тема 6", q: "Кто предложил язык HTML в 1989 году?", options: ["Билл Гейтс", "Тим Бернерс-Ли", "Стив Джобс", "Джордж Буль"], correct: [1], explain: "Тим Бернерс-Ли предложил HTML в 1989 году." },
  { topic: "Тема 6", q: "Самый крупный заголовок в HTML задаётся тегом:", options: ["<h6>", "<title>", "<h1>", "<p>"], correct: [2], explain: "<h1> - заголовок первого уровня, самый крупный." },
  { topic: "Тема 6", q: "Что расшифровывается как Cascading Style Sheets?", options: ["HTML", "CSS", "URL", "DNS"], correct: [1], explain: "CSS (Cascading Style Sheets) - каскадные таблицы стилей." },
  { topic: "Тема 6", q: "Тег для вставки изображения:", options: ["<pic>", "<image>", "<img>", "<src>"], correct: [2], explain: "<img src=\"...\"> вставляет изображение на страницу." },

  { topic: "Тема 7", q: "Как называются столбцы таблицы реляционной БД?", options: ["записи", "поля", "индексы", "ключи"], correct: [1], explain: "Столбцы реляционной таблицы называются полями." },
  { topic: "Тема 7", q: "Поле или набор полей, однозначно определяющих каждую запись:", options: ["индекс", "внешний ключ", "первичный ключ", "домен"], correct: [2], explain: "Первичный ключ однозначно определяет каждую запись." },
  { topic: "Тема 7", q: "Язык структурированных запросов для управления БД:", options: ["HTML", "CSS", "SQL", "DNS"], correct: [2], explain: "SQL - язык для управления реляционными базами данных." },
  { topic: "Тема 7", q: "Команда SQL, задающая условие отбора записей:", options: ["SELECT", "WHERE", "FROM", "DELETE"], correct: [1], explain: "WHERE задаёт условие отбора записей." },

  { topic: "Тема 8", q: "Защитная преграда между локальной сетью и интернетом:", options: ["антивирус", "брандмауэр", "VPN", "прокси"], correct: [1], explain: "Брандмауэр контролирует и фильтрует трафик." },
  { topic: "Тема 8", q: "Вредоносная программа, маскирующаяся под лицензионную:", options: ["вирус", "червь", "троян", "фишинг"], correct: [2], explain: "Троян маскируется под лицензионную программу." },
  { topic: "Тема 8", q: "Сохранение информации в неискажённом виде:", options: ["доступность", "конфиденциальность", "целостность", "шифрование"], correct: [2], explain: "Целостность означает, что информация остаётся неизменной." },
  { topic: "Тема 8", q: "Набор электронных символов, подтверждающий подлинность документа:", options: ["пароль", "ЭЦП", "индекс", "сертификат SSL"], correct: [1], explain: "ЭЦП подтверждает подлинность и авторство документа." },

  { topic: "Тема 9", q: "Кто впервые использовал термин «Искусственный интеллект»?", options: ["Джон фон Нейман", "Джон Маккарти", "Джарон Ланье", "Тим Бернерс-Ли"], correct: [1], explain: "Джон Маккарти впервые использовал термин в 1956 году." },
  { topic: "Тема 9", q: "Что означает слово «блокчейн» дословно?", options: ["сеть блоков", "цепочка блоков", "строение блоков", "набор блоков"], correct: [1], explain: "Blockchain переводится как «цепочка блоков»." },
  { topic: "Тема 9", q: "Расшифровка аббревиатуры IoT:", options: ["Internet of Technology", "Internet of Things", "Internet over TCP", "International Object Table"], correct: [1], explain: "IoT - Internet of Things (Интернет вещей)." },
  { topic: "Тема 9", q: "Реальный мир, дополненный виртуальными элементами:", options: ["VR", "AR", "ИИ", "IoT"], correct: [1], explain: "AR (Augmented Reality) дополняет реальный мир виртуальными элементами." },

  { topic: "Тема 10", q: "Кто ввёл термин «стартап»?", options: ["Пол Грэм", "Стив Бланк", "Стив Джобс", "Стивен Брэдфорд"], correct: [1], explain: "Термин «стартап» ввёл Стив Бланк." },
  { topic: "Тема 10", q: "Самый первый этап развития стартапа, когда есть только идея:", options: ["seed", "прототип", "pre-seed", "альфа-версия"], correct: [2], explain: "Pre-seed - самый первый этап." },
  { topic: "Тема 10", q: "Финансирование проекта путём сбора небольших сумм от многих людей через интернет:", options: ["венчурный капитал", "краудфандинг", "кредит", "грант"], correct: [1], explain: "Краудфандинг - сбор небольших сумм от многих людей через интернет." },
  { topic: "Тема 10", q: "Метод продвижения на основе платных сообщений через СМИ:", options: ["личная продажа", "реклама", "PR", "стимулирование сбыта"], correct: [1], explain: "Реклама - распространение платных сообщений через СМИ." }
];
const form = document.getElementById('quizForm');
const totalCountEl = document.getElementById('totalCount');
totalCountEl.textContent = questions.length;

function renderQuiz() {
  form.innerHTML = '';
  questions.forEach((item, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.dataset.qi = qi;
    const letters = ['A','B','C','D','E','F'];
    let optsHtml = '';
    item.options.forEach((opt, oi) => {
      const inputType = item.multi ? 'checkbox' : 'radio';
      optsHtml += `<label class="option" data-oi="${oi}">
        <input type="${inputType}" name="q${qi}" value="${oi}" onchange="selectOption(${qi}, ${oi}, this)">
        ${letters[oi]}) ${opt}
      </label>`;
    });
    div.innerHTML = `
      <div class="qtext">${item.topic ? `<span class="topic-badge">${item.topic}</span>` : ''}<span class="qnum">${qi+1}.</span>${item.q}
        ${item.multi ? '<span class="multi-hint">(несколько верных ответов)</span>' : ''}
      </div>
      ${optsHtml}
      <div class="explain" id="explain${qi}">${item.explain}</div>
    `;
    form.appendChild(div);
  });
}

const userAnswers = {};

function selectOption(qi, oi, inputEl) {
  const qDiv = form.querySelector(`[data-qi="${qi}"]`);
  const isMulti = questions[qi].multi;
  if (!userAnswers[qi]) userAnswers[qi] = new Set();

  if (isMulti) {
    if (inputEl.checked) userAnswers[qi].add(oi);
    else userAnswers[qi].delete(oi);
    if (userAnswers[qi].size === 0) delete userAnswers[qi];
  } else {
    userAnswers[qi] = new Set([oi]);
  }

  qDiv.querySelectorAll('.option').forEach(optLabel => {
    const optOi = parseInt(optLabel.dataset.oi);
    const input = optLabel.querySelector('input');
    optLabel.classList.toggle('selected', input.checked);
  });

  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(userAnswers).length;
  document.getElementById('answeredCount').textContent = answered;
  const pct = Math.round((answered / questions.length) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
}

function checkAnswers() {
  let score = 0;
  questions.forEach((item, qi) => {
    const qDiv = form.querySelector(`[data-qi="${qi}"]`);
    const userSet = userAnswers[qi] || new Set();
    const correctSet = new Set(item.correct);
    const isCorrect = userSet.size === correctSet.size && [...userSet].every(v => correctSet.has(v));
    if (isCorrect) score++;

    qDiv.querySelectorAll('.option').forEach(optLabel => {
      const oi = parseInt(optLabel.dataset.oi);
      const input = optLabel.querySelector('input');
      input.disabled = true;
      if (correctSet.has(oi)) optLabel.classList.add('correct');
      else if (userSet.has(oi)) optLabel.classList.add('wrong');
    });
    document.getElementById('explain' + qi).style.display = 'block';
  });

  document.getElementById('submitBtn').style.display = 'none';
  const resultBox = document.getElementById('resultBox');
  resultBox.style.display = 'block';
  document.getElementById('scoreCircle').textContent = score + ' / ' + questions.length;
  const pct = Math.round((score / questions.length) * 100);
  let msg = '';
  if (pct >= 85) msg = 'Отличный результат! Тема усвоена.';
  else if (pct >= 60) msg = 'Хороший результат, но стоит повторить некоторые вопросы.';
  else msg = 'Рекомендуется повторить тему и пройти тест ещё раз.';
  const saved = (typeof EduConProgress !== 'undefined')
    ? EduConProgress.recordResult('final', 'Итоговый тест (все темы)', score, questions.length)
    : null;
  let bestMsg = '';
  if (saved && saved.isNewBest) bestMsg = ' \uD83C\uDFC6 Новый личный рекорд!';
  document.getElementById('scoreMsg').textContent = msg + ` (${pct}%)` + bestMsg;
  resultBox.scrollIntoView({behavior: 'smooth'});
}

function resetQuiz() {
  for (const key in userAnswers) delete userAnswers[key];
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('submitBtn').style.display = 'block';
  updateProgress();
  renderQuiz();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

renderQuiz();
if (typeof EduConProgress !== 'undefined') { EduConProgress.ensureNickname(); }
</script>

</body>
</html>
