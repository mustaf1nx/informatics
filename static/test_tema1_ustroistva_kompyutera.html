<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест: Устройства компьютера. Аппаратное и программное обеспечение</title>
<style>
  :root {
    --primary: #E4E6EC;
    --accent: #2DD4BF;
    --pop: #FF7A93;
    --correct: #2DD4BF;
    --wrong: #FF7A93;
    --bg: #0F1117;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 0;
    color: #DDE1E8;
  }
  header {
    background: #171A24;
    color: #F2F4F8;
    padding: 24px 20px;
    text-align: center;
    border-bottom: 3px solid #2DD4BF;
  }
  header h1 { margin: 0 0 6px 0; font-size: 1.3rem; }
  header p { margin: 0; opacity: 0.85; font-size: 0.9rem; font-family: 'DejaVu Sans Mono', monospace; }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  .progress-wrap {
    background: #171A24;
    border: 1.5px solid #262A38;
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 20px;
    position: sticky;
    top: 10px;
    z-index: 10;
    color: #C3C8D4;
  }
  .progress-bar-bg {
    background: #262A38;
    border-radius: 6px;
    height: 8px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-bar {
    background: var(--accent);
    height: 100%;
    width: 0%;
    transition: width 0.3s;
  }
  .question {
    background: #171A24;
    border: 1.5px solid #262A38;
    border-left: 3px solid #8C7CFF;
    border-radius: 4px;
    padding: 16px 18px;
    margin-bottom: 14px;
    color: #DDE1E8;
  }
  .qtext {
    font-weight: 600;
    margin-bottom: 10px;
    font-size: 1rem;
  }
  .qnum {
    color: var(--accent);
    margin-right: 6px;
  }
  .multi-hint {
    font-size: 0.78rem;
    color: #7A8093;
    font-weight: normal;
    display: block;
    margin-top: 2px;
  }
  .option {
    display: block;
    padding: 10px 12px;
    margin-bottom: 8px;
    border: 1.5px solid #262A38;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.95rem;
    color: #DDE1E8;
  }
  .option:hover { border-color: var(--accent); background: #10221E; }
  .option.selected {
    border-color: #8C7CFF;
    background: #1B1A33;
    font-weight: 600;
  }
  .option.correct {
    border-color: var(--correct);
    background: #10221E;
    color: #DDE1E8;
  }
  .option.wrong {
    border-color: var(--wrong);
    background: #2A1418;
    color: #DDE1E8;
  }
  .option input { margin-right: 8px; }
  #submitBtn {
    display: block;
    width: 100%;
    background: #2DD4BF;
    color: #0F1117;
    border: none;
    padding: 14px;
    font-size: 1.05rem;
    font-family: 'DejaVu Sans Mono', monospace;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 10px;
    font-weight: bold;
  }
  #submitBtn:hover { background: #5CE6D5; }
  #submitBtn:disabled { background: #33384A; color: #7A8093; cursor: not-allowed; }
  #resultBox {
    display: none;
    background: #171A24;
    border: 1.5px solid #262A38;
    border-radius: 6px;
    padding: 24px 20px;
    text-align: center;
    margin-bottom: 20px;
  }
  #resultBox h2 { color: var(--primary); margin-top: 0; }
  #scoreCircle {
    font-size: 2.2rem;
    font-weight: 800;
    color: #2DD4BF;
    font-family: 'DejaVu Sans Mono', monospace;
  }
  #retryBtn {
    background: #2DD4BF;
    color: #0F1117;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
    font-size: 0.95rem;
    font-weight: bold;
  }
  .explain {
    font-size: 0.85rem;
    color: #A7ADBB;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed #33384A;
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>Устройства компьютера. Аппаратное и программное обеспечение</h1>
  <p>Тест по информатике &middot; 11 класс &middot; подготовка к ЕНТ</p>
  <p style="margin-top:4px; font-size:0.78rem; letter-spacing:1px; text-transform:uppercase; opacity:0.8;">by Azamat</p>
</header>

<div class="container">

  <div class="progress-wrap">
    <div style="display:flex; justify-content:space-between; font-size:0.85rem; color:#555;">
      <span>Отвечено: <span id="answeredCount">0</span> из <span id="totalCount">0</span></span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <div id="resultBox">
    <h2>Результат теста</h2>
    <div id="scoreCircle">0 / 0</div>
    <p id="scoreMsg"></p>
    <button id="retryBtn" onclick="resetQuiz()">Пройти заново</button>
  </div>

  <div id="quizForm"></div>

  <button id="submitBtn" onclick="checkAnswers()">Проверить ответы</button>

</div>

<script src="progress.js"></script>
<script>
const questions = [
  {
    q: "Как называется «мозг» компьютера, выполняющий все вычисления?",
    options: ["Жёсткий диск", "Процессор", "Видеокарта", "Блок питания"],
    correct: [1],
    explain: "Процессор (CPU) обрабатывает все вычисления в компьютере."
  },
  {
    q: "Устройство, соединяющее все внутренние компоненты компьютера друг с другом:",
    options: ["Материнская плата", "Процессор", "Звуковой адаптер", "ОЗУ"],
    correct: [0],
    explain: "Материнская плата - плата, объединяющая все внутренние устройства компьютера."
  },
  {
    q: "Какой вид памяти теряет данные при выключении компьютера?",
    options: ["Жёсткий диск", "Флеш-память", "ОЗУ (RAM)", "Оптический диск"],
    correct: [2],
    explain: "ОЗУ - энергозависимая память, данные сохраняются только пока включено питание."
  },
  {
    q: "Память, хранящая дату, время и настройки BIOS:",
    options: ["CMOS", "Кэш", "ROM", "VRAM"],
    correct: [0],
    explain: "CMOS-память хранит дату, время, пароль и конфигурацию компьютера."
  },
  {
    q: "Оптический диск формата, допускающего многократную перезапись:",
    options: ["CD-R", "DVD-R", "CD-RW", "BD-R"],
    correct: [2],
    explain: "Формат «RW» (read/write) позволяет записывать, стирать и перезаписывать данные многократно."
  },
  {
    q: "Какое ПО относится к инструментальному?",
    options: ["Microsoft Word", "Borland Delphi", "Paint", "Windows Media Player"],
    correct: [1],
    explain: "Инструментальное ПО служит для создания новых программ. Borland Delphi - среда программирования."
  },
  {
    q: "Программа, распространяемая как демо-версия с ограничениями на определённый срок:",
    options: ["Лицензионная", "Условно бесплатная (Shareware)", "Свободно распространяемая", "Системная"],
    correct: [1],
    explain: "Условно бесплатные программы дают демо-доступ на ограниченный срок."
  },
  {
    q: "Способность ПО безотказно работать в течение заданного времени - это:",
    options: ["Функциональность", "Мобильность", "Надёжность", "Эргономичность"],
    correct: [2],
    explain: "Надёжность - способность безотказно выполнять функции в течение заданного времени."
  },
  {
    q: "Кто заложил архитектуру персонального компьютера в 1945 году?",
    options: ["Билл Гейтс", "Джон фон Нейман", "Стив Джобс", "Блез Паскаль"],
    correct: [1],
    explain: "Джон фон Нейман предложил архитектуру ЭВМ с УУ, АЛУ, памятью и устройствами ввода-вывода."
  },
  {
    q: "Принцип архитектуры фон Неймана, согласно которому команды и данные хранятся в одной памяти:",
    options: ["Адресности", "Однородности памяти", "Программного управления", "Двоичного кодирования"],
    correct: [1],
    explain: "Принцип однородности памяти: команды и данные хранятся вместе и различаются лишь по способу использования."
  },
  {
    q: "Этап работы процессора, на котором команда переводится в машинный код:",
    options: ["Выборка", "Декодирование", "Выполнение", "Запись"],
    correct: [1],
    explain: "Декодирование - перевод команды на язык ассемблера, понятный процессору."
  },
  {
    q: "АЛУ выполняет:",
    options: ["Только хранение данных", "Арифметические и логические операции", "Вывод изображения", "Охлаждение процессора"],
    correct: [1],
    explain: "Арифметико-логическое устройство выполняет арифметические и логические операции над данными."
  },
  {
    q: "Команда Windows для просмотра конфигурации компьютера через диалог «Выполнить»:",
    options: ["cmd", "msinfo32", "regedit", "taskmgr"],
    correct: [1],
    explain: "Win+R → msinfo32 открывает окно «Сведения о системе»."
  },
  {
    q: "Программа для определения характеристик процессора, материнской платы и видеокарты:",
    options: ["CPU-Z", "Paint", "WordPad", "Adobe Reader"],
    correct: [0],
    explain: "CPU-Z показывает подробные технические характеристики компонентов ПК."
  },
  {
    q: "К устройствам ввода относится (выберите все верные):",
    options: ["Клавиатура", "Сканер", "Монитор", "Веб-камера", "Принтер"],
    correct: [0,1,3],
    explain: "Клавиатура, сканер и веб-камера - устройства ввода. Монитор и принтер - устройства вывода.",
    multi: true
  },
  {
    q: "К внутренней памяти относится (выберите все верные):",
    options: ["RAM", "ROM", "Жёсткий диск", "CMOS", "Флеш-память"],
    correct: [0,1,3],
    explain: "RAM, ROM и CMOS - виды внутренней памяти. Жёсткий диск и флеш-память - внешняя память.",
    multi: true
  },
  {
    q: "Виртуальная машина - это:",
    options: ["Физическое устройство ввода", "Среда для запуска другой операционной системы внутри основной", "Вид процессора", "Тип монитора"],
    correct: [1],
    explain: "Виртуальная машина позволяет запускать любую ОС в изолированной среде на основном компьютере."
  },
  {
    q: "Какое устройство преобразует напряжение 220В в напряжение, необходимое внутренним компонентам?",
    options: ["Видеокарта", "Блок питания", "Сетевой адаптер", "Кэш-память"],
    correct: [1],
    explain: "Блок питания преобразует 220В переменного тока в 5В/12В постоянного тока."
  },
  {
    q: "Уровни программного обеспечения (выберите все верные):",
    options: ["Системное и служебное", "Прикладное", "Инструментальное", "Сетевое", "Графическое"],
    correct: [0,1,2],
    explain: "Три уровня ПО: системное и служебное, прикладное, инструментальное.",
    multi: true
  },
  {
    q: "Базовая конфигурация персонального компьютера включает:",
    options: ["Системный блок, монитор, клавиатуру, мышь", "Только системный блок", "Монитор и принтер", "Клавиатуру и сканер"],
    correct: [0],
    explain: "Базовая конфигурация ПК - это системный блок, монитор, клавиатура и мышь."
  }
];

const form = document.getElementById('quizForm');
const totalCountEl = document.getElementById('totalCount');
totalCountEl.textContent = questions.length;

function renderQuiz() {
  form.innerHTML = '';
  questions.forEach((item, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.dataset.qi = qi;
    const letters = ['A','B','C','D','E','F'];
    let optsHtml = '';
    item.options.forEach((opt, oi) => {
      const inputType = item.multi ? 'checkbox' : 'radio';
      optsHtml += `<label class="option" data-oi="${oi}">
        <input type="${inputType}" name="q${qi}" value="${oi}" onchange="selectOption(${qi}, ${oi}, this)">
        ${letters[oi]}) ${opt}
      </label>`;
    });
    div.innerHTML = `
      <div class="qtext"><span class="qnum">${qi+1}.</span>${item.q}
        ${item.multi ? '<span class="multi-hint">(несколько верных ответов)</span>' : ''}
      </div>
      ${optsHtml}
      <div class="explain" id="explain${qi}">${item.explain}</div>
    `;
    form.appendChild(div);
  });
}

const userAnswers = {};

function selectOption(qi, oi, inputEl) {
  const qDiv = form.querySelector(`[data-qi="${qi}"]`);
  const isMulti = questions[qi].multi;
  if (!userAnswers[qi]) userAnswers[qi] = new Set();

  if (isMulti) {
    if (inputEl.checked) userAnswers[qi].add(oi);
    else userAnswers[qi].delete(oi);
    if (userAnswers[qi].size === 0) delete userAnswers[qi];
  } else {
    userAnswers[qi] = new Set([oi]);
  }

  qDiv.querySelectorAll('.option').forEach(optLabel => {
    const optOi = parseInt(optLabel.dataset.oi);
    const input = optLabel.querySelector('input');
    optLabel.classList.toggle('selected', input.checked);
  });

  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(userAnswers).length;
  document.getElementById('answeredCount').textContent = answered;
  const pct = Math.round((answered / questions.length) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
}

function checkAnswers() {
  let score = 0;
  questions.forEach((item, qi) => {
    const qDiv = form.querySelector(`[data-qi="${qi}"]`);
    const userSet = userAnswers[qi] || new Set();
    const correctSet = new Set(item.correct);
    const isCorrect = userSet.size === correctSet.size && [...userSet].every(v => correctSet.has(v));
    if (isCorrect) score++;

    qDiv.querySelectorAll('.option').forEach(optLabel => {
      const oi = parseInt(optLabel.dataset.oi);
      const input = optLabel.querySelector('input');
      input.disabled = true;
      if (correctSet.has(oi)) optLabel.classList.add('correct');
      else if (userSet.has(oi)) optLabel.classList.add('wrong');
    });
    document.getElementById('explain' + qi).style.display = 'block';
  });

  document.getElementById('submitBtn').style.display = 'none';
  const resultBox = document.getElementById('resultBox');
  resultBox.style.display = 'block';
  document.getElementById('scoreCircle').textContent = score + ' / ' + questions.length;
  const pct = Math.round((score / questions.length) * 100);
  let msg = '';
  if (pct >= 85) msg = 'Отличный результат! Тема усвоена.';
  else if (pct >= 60) msg = 'Хороший результат, но стоит повторить некоторые вопросы.';
  else msg = 'Рекомендуется повторить тему и пройти тест ещё раз.';
  const saved = (typeof EduConProgress !== 'undefined')
    ? EduConProgress.recordResult('tema1', 'Устройства компьютера. Аппаратное и программное обеспечение', score, questions.length)
    : null;
  let bestMsg = '';
  if (saved && saved.isNewBest) bestMsg = ' \uD83C\uDFC6 Новый личный рекорд!';
  document.getElementById('scoreMsg').textContent = msg + ` (${pct}%)` + bestMsg;
  resultBox.scrollIntoView({behavior: 'smooth'});
}

function resetQuiz() {
  for (const key in userAnswers) delete userAnswers[key];
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('submitBtn').style.display = 'block';
  updateProgress();
  renderQuiz();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

renderQuiz();
if (typeof EduConProgress !== 'undefined') { EduConProgress.ensureNickname(); }
</script>

</body>
</html>
