<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест: Современные процессы в развитии ИТ</title>
<style>
  :root {
    --primary: #E4E6EC;
    --accent: #2DD4BF;
    --pop: #FF7A93;
    --correct: #2DD4BF;
    --wrong: #FF7A93;
    --bg: #0F1117;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 0;
    color: #DDE1E8;
  }
  header {
    background: #171A24;
    color: #F2F4F8;
    padding: 24px 20px;
    text-align: center;
    border-bottom: 3px solid #2DD4BF;
  }
  header h1 { margin: 0 0 6px 0; font-size: 1.3rem; }
  header p { margin: 0; opacity: 0.85; font-size: 0.9rem; font-family: 'DejaVu Sans Mono', monospace; }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  .progress-wrap {
    background: #171A24;
    border: 1.5px solid #262A38;
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 20px;
    position: sticky;
    top: 10px;
    z-index: 10;
    color: #C3C8D4;
  }
  .progress-bar-bg {
    background: #262A38;
    border-radius: 6px;
    height: 8px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-bar {
    background: var(--accent);
    height: 100%;
    width: 0%;
    transition: width 0.3s;
  }
  .question {
    background: #171A24;
    border: 1.5px solid #262A38;
    border-left: 3px solid #8C7CFF;
    border-radius: 4px;
    padding: 16px 18px;
    margin-bottom: 14px;
    color: #DDE1E8;
  }
  .qtext {
    font-weight: 600;
    margin-bottom: 10px;
    font-size: 1rem;
  }
  .qnum {
    color: var(--accent);
    margin-right: 6px;
  }
  .multi-hint {
    font-size: 0.78rem;
    color: #7A8093;
    font-weight: normal;
    display: block;
    margin-top: 2px;
  }
  .option {
    display: block;
    padding: 10px 12px;
    margin-bottom: 8px;
    border: 1.5px solid #262A38;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.95rem;
    color: #DDE1E8;
  }
  .option:hover { border-color: var(--accent); background: #10221E; }
  .option.selected {
    border-color: #8C7CFF;
    background: #1B1A33;
    font-weight: 600;
  }
  .option.correct {
    border-color: var(--correct);
    background: #10221E;
    color: #DDE1E8;
  }
  .option.wrong {
    border-color: var(--wrong);
    background: #2A1418;
    color: #DDE1E8;
  }
  .option input { margin-right: 8px; }
  #submitBtn {
    display: block;
    width: 100%;
    background: #2DD4BF;
    color: #0F1117;
    border: none;
    padding: 14px;
    font-size: 1.05rem;
    font-family: 'DejaVu Sans Mono', monospace;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 10px;
    font-weight: bold;
  }
  #submitBtn:hover { background: #5CE6D5; }
  #submitBtn:disabled { background: #33384A; color: #7A8093; cursor: not-allowed; }
  #resultBox {
    display: none;
    background: #171A24;
    border: 1.5px solid #262A38;
    border-radius: 6px;
    padding: 24px 20px;
    text-align: center;
    margin-bottom: 20px;
  }
  #resultBox h2 { color: var(--primary); margin-top: 0; }
  #scoreCircle {
    font-size: 2.2rem;
    font-weight: 800;
    color: #2DD4BF;
    font-family: 'DejaVu Sans Mono', monospace;
  }
  #retryBtn {
    background: #2DD4BF;
    color: #0F1117;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
    font-size: 0.95rem;
    font-weight: bold;
  }
  .explain {
    font-size: 0.85rem;
    color: #A7ADBB;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed #33384A;
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>Современные процессы в развитии информационных технологий</h1>
  <p>Тест по информатике &middot; 11 класс &middot; подготовка к ЕНТ</p>
  <p style="margin-top:4px; font-size:0.78rem; letter-spacing:1px; text-transform:uppercase; opacity:0.8;">by Azamat</p>
</header>

<div class="container">

  <div class="progress-wrap">
    <div style="display:flex; justify-content:space-between; font-size:0.85rem; color:#555;">
      <span>Отвечено: <span id="answeredCount">0</span> из <span id="totalCount">0</span></span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <div id="resultBox">
    <h2>Результат теста</h2>
    <div id="scoreCircle">0 / 0</div>
    <p id="scoreMsg"></p>
    <button id="retryBtn" onclick="resetQuiz()">Пройти заново</button>
  </div>

  <div id="quizForm"></div>

  <button id="submitBtn" onclick="checkAnswers()">Проверить ответы</button>

</div>

<script src="progress.js"></script>
<script>
const questions = [
  {
    q: "В каком году впервые использован термин «Искусственный интеллект»?",
    options: ["1946", "1956", "1966", "1989"],
    correct: [1],
    explain: "Термин появился в 1956 году на конференции в Дартмутском университете."
  },
  {
    q: "Кто впервые использовал термин «Искусственный интеллект»?",
    options: ["Джон фон Нейман", "Джон Маккарти", "Джарон Ланье", "Тим Бернерс-Ли"],
    correct: [1],
    explain: "Джон Маккарти впервые использовал термин на конференции в Дартмуте в 1956 году."
  },
  {
    q: "Ветвь ИИ, при которой компьютер сам обучается решению задачи:",
    options: ["блокчейн", "машинное обучение", "IoT", "криптография"],
    correct: [1],
    explain: "Машинное обучение - ветвь ИИ, где компьютер обучается на данных, а не по жёсткому алгоритму."
  },
  {
    q: "Тип машинного обучения, при котором данные заранее размечены человеком:",
    options: ["без учителя", "с учителем", "с подкреплением", "кластеризация"],
    correct: [1],
    explain: "Обучение с учителем использует заранее размеченные данные."
  },
  {
    q: "Задача, в которой ответом является число (не категория):",
    options: ["классификация", "регрессия", "кластеризация", "ассоциация"],
    correct: [1],
    explain: "В регрессии ответом является число, а не категория (в отличие от классификации)."
  },
  {
    q: "Метод обучения без учителя, объединяющий похожие объекты в группы:",
    options: ["регрессия", "классификация", "кластеризация", "валидация"],
    correct: [2],
    explain: "Кластеризация группирует похожие объекты без заранее известных классов."
  },
  {
    q: "Что означает слово «блокчейн» дословно?",
    options: ["сеть блоков", "цепочка блоков", "строение блоков", "набор блоков"],
    correct: [1],
    explain: "Blockchain (block - блок, chain - цепь) переводится как «цепочка блоков»."
  },
  {
    q: "Свойство блокчейна, при котором нет главного сервера хранения:",
    options: ["прозрачность", "конфиденциальность", "децентрализация", "надёжность"],
    correct: [2],
    explain: "Децентрализация - записи хранятся у каждого участника сети, а не на одном сервере."
  },
  {
    q: "Сфера, где блокчейн используется больше всего:",
    options: ["логистика", "банковская сфера", "образование", "медицина"],
    correct: [1],
    explain: "Блокчейн активнее всего применяется в банковской сфере для защиты финансов."
  },
  {
    q: "Расшифровка аббревиатуры IoT:",
    options: ["Internet of Technology", "Internet of Things", "Internet over TCP", "International Object Table"],
    correct: [1],
    explain: "IoT расшифровывается как Internet of Things (Интернет вещей)."
  },
  {
    q: "Протокол, на основе которого работает обмен данными IoT:",
    options: ["HTML", "CSS", "TCP/IP", "SQL"],
    correct: [2],
    explain: "Устройства IoT обмениваются данными через протоколы TCP/IP."
  },
  {
    q: "Направление IoT, включающее умный дом и фитнес-браслеты:",
    options: ["промышленный IoT", "пользовательский IoT", "банковский IoT", "медицинский IoT"],
    correct: [1],
    explain: "Пользовательский IoT включает умный дом, фитнес-браслеты, умные часы."
  },
  {
    q: "Мир, полностью созданный техническими средствами, имитирующий среду:",
    options: ["AR", "VR", "IoT", "CSS"],
    correct: [1],
    explain: "VR (Virtual Reality) - полностью искусственная среда, имитирующая взаимодействие."
  },
  {
    q: "Реальный мир, дополненный виртуальными элементами:",
    options: ["VR", "AR", "ИИ", "IoT"],
    correct: [1],
    explain: "AR (Augmented Reality) дополняет реальный мир виртуальными элементами."
  },
  {
    q: "Первое VR-устройство, разработанное в 1961 году:",
    options: ["HoloLens", "Google Glass", "Headsight", "Tesla Suit"],
    correct: [2],
    explain: "Headsight (Philco, 1961) - первый VR-шлем, разработанный для пилотов."
  },
  {
    q: "Кто ввёл термин «виртуальная реальность»?",
    options: ["Джарон Ланье", "Джон Маккарти", "Мортон Хейлиг", "Том Коделл"],
    correct: [0],
    explain: "Авторство термина «виртуальная реальность» принадлежит Джарону Ланье."
  },
  {
    q: "Стандарт для качественной сетевой визуализации VR в интернете:",
    options: ["HTML5", "X3D", "SQL", "CSS3"],
    correct: [1],
    explain: "X3D (Extensible 3D) - стандарт для сетевой визуализации VR, интегрированный с XML."
  },
  {
    q: "Возможное негативное влияние длительного использования VR на человека:",
    options: ["улучшение зрения", "укачивание и зрительное утомление", "повышение концентрации", "ускорение мышления"],
    correct: [1],
    explain: "Длительное использование VR может вызывать укачивание, зрительное утомление, нарушение осанки."
  },
  {
    q: "Составляющие машинного обучения (выберите все верные):",
    options: ["данные", "признаки", "алгоритм", "блокчейн", "шифрограмма"],
    correct: [0,1,2],
    explain: "Три составляющие машинного обучения: данные, признаки, алгоритм.",
    multi: true
  },
  {
    q: "Задачи обучения без учителя (выберите все верные):",
    options: ["кластеризация", "обобщение", "ассоциация", "классификация", "регрессия"],
    correct: [0,1,2],
    explain: "Кластеризация, обобщение и ассоциация - задачи обучения без учителя. Классификация и регрессия - задачи обучения с учителем.",
    multi: true
  }
];
const form = document.getElementById('quizForm');
const totalCountEl = document.getElementById('totalCount');
totalCountEl.textContent = questions.length;

function renderQuiz() {
  form.innerHTML = '';
  questions.forEach((item, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.dataset.qi = qi;
    const letters = ['A','B','C','D','E','F'];
    let optsHtml = '';
    item.options.forEach((opt, oi) => {
      const inputType = item.multi ? 'checkbox' : 'radio';
      optsHtml += `<label class="option" data-oi="${oi}">
        <input type="${inputType}" name="q${qi}" value="${oi}" onchange="selectOption(${qi}, ${oi}, this)">
        ${letters[oi]}) ${opt}
      </label>`;
    });
    div.innerHTML = `
      <div class="qtext"><span class="qnum">${qi+1}.</span>${item.q}
        ${item.multi ? '<span class="multi-hint">(несколько верных ответов)</span>' : ''}
      </div>
      ${optsHtml}
      <div class="explain" id="explain${qi}">${item.explain}</div>
    `;
    form.appendChild(div);
  });
}

const userAnswers = {};

function selectOption(qi, oi, inputEl) {
  const qDiv = form.querySelector(`[data-qi="${qi}"]`);
  const isMulti = questions[qi].multi;
  if (!userAnswers[qi]) userAnswers[qi] = new Set();

  if (isMulti) {
    if (inputEl.checked) userAnswers[qi].add(oi);
    else userAnswers[qi].delete(oi);
    if (userAnswers[qi].size === 0) delete userAnswers[qi];
  } else {
    userAnswers[qi] = new Set([oi]);
  }

  qDiv.querySelectorAll('.option').forEach(optLabel => {
    const optOi = parseInt(optLabel.dataset.oi);
    const input = optLabel.querySelector('input');
    optLabel.classList.toggle('selected', input.checked);
  });

  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(userAnswers).length;
  document.getElementById('answeredCount').textContent = answered;
  const pct = Math.round((answered / questions.length) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
}

function checkAnswers() {
  let score = 0;
  questions.forEach((item, qi) => {
    const qDiv = form.querySelector(`[data-qi="${qi}"]`);
    const userSet = userAnswers[qi] || new Set();
    const correctSet = new Set(item.correct);
    const isCorrect = userSet.size === correctSet.size && [...userSet].every(v => correctSet.has(v));
    if (isCorrect) score++;

    qDiv.querySelectorAll('.option').forEach(optLabel => {
      const oi = parseInt(optLabel.dataset.oi);
      const input = optLabel.querySelector('input');
      input.disabled = true;
      if (correctSet.has(oi)) optLabel.classList.add('correct');
      else if (userSet.has(oi)) optLabel.classList.add('wrong');
    });
    document.getElementById('explain' + qi).style.display = 'block';
  });

  document.getElementById('submitBtn').style.display = 'none';
  const resultBox = document.getElementById('resultBox');
  resultBox.style.display = 'block';
  document.getElementById('scoreCircle').textContent = score + ' / ' + questions.length;
  const pct = Math.round((score / questions.length) * 100);
  let msg = '';
  if (pct >= 85) msg = 'Отличный результат! Тема усвоена.';
  else if (pct >= 60) msg = 'Хороший результат, но стоит повторить некоторые вопросы.';
  else msg = 'Рекомендуется повторить тему и пройти тест ещё раз.';
  const saved = (typeof EduConProgress !== 'undefined')
    ? EduConProgress.recordResult('tema9', 'Современные процессы в развитии информационных технологий', score, questions.length)
    : null;
  let bestMsg = '';
  if (saved && saved.isNewBest) bestMsg = ' \uD83C\uDFC6 Новый личный рекорд!';
  document.getElementById('scoreMsg').textContent = msg + ` (${pct}%)` + bestMsg;
  resultBox.scrollIntoView({behavior: 'smooth'});
}

function resetQuiz() {
  for (const key in userAnswers) delete userAnswers[key];
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('submitBtn').style.display = 'block';
  updateProgress();
  renderQuiz();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

renderQuiz();
if (typeof EduConProgress !== 'undefined') { EduConProgress.ensureNickname(); }
</script>

</body>
</html>
