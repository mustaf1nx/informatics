<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест: Представление, измерение и кодирование информации. Логические основы компьютера</title>
<style>
  :root {
    --primary: #E4E6EC;
    --accent: #2DD4BF;
    --pop: #FF7A93;
    --correct: #2DD4BF;
    --wrong: #FF7A93;
    --bg: #0F1117;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 0;
    color: #DDE1E8;
  }
  header {
    background: #171A24;
    color: #F2F4F8;
    padding: 24px 20px;
    text-align: center;
    border-bottom: 3px solid #2DD4BF;
  }
  header h1 { margin: 0 0 6px 0; font-size: 1.3rem; }
  header p { margin: 0; opacity: 0.85; font-size: 0.9rem; font-family: 'DejaVu Sans Mono', monospace; }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  .progress-wrap {
    background: #171A24;
    border: 1.5px solid #262A38;
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 20px;
    position: sticky;
    top: 10px;
    z-index: 10;
    color: #C3C8D4;
  }
  .progress-bar-bg {
    background: #262A38;
    border-radius: 6px;
    height: 8px;
    overflow: hidden;
    margin-top: 6px;
  }
  .progress-bar {
    background: var(--accent);
    height: 100%;
    width: 0%;
    transition: width 0.3s;
  }
  .question {
    background: #171A24;
    border: 1.5px solid #262A38;
    border-left: 3px solid #8C7CFF;
    border-radius: 4px;
    padding: 16px 18px;
    margin-bottom: 14px;
    color: #DDE1E8;
  }
  .qtext {
    font-weight: 600;
    margin-bottom: 10px;
    font-size: 1rem;
  }
  .qnum {
    color: var(--accent);
    margin-right: 6px;
  }
  .multi-hint {
    font-size: 0.78rem;
    color: #7A8093;
    font-weight: normal;
    display: block;
    margin-top: 2px;
  }
  .option {
    display: block;
    padding: 10px 12px;
    margin-bottom: 8px;
    border: 1.5px solid #262A38;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.95rem;
    color: #DDE1E8;
  }
  .option:hover { border-color: var(--accent); background: #10221E; }
  .option.selected {
    border-color: #8C7CFF;
    background: #1B1A33;
    font-weight: 600;
  }
  .option.correct {
    border-color: var(--correct);
    background: #10221E;
    color: #DDE1E8;
  }
  .option.wrong {
    border-color: var(--wrong);
    background: #2A1418;
    color: #DDE1E8;
  }
  .option input { margin-right: 8px; }
  #submitBtn {
    display: block;
    width: 100%;
    background: #2DD4BF;
    color: #0F1117;
    border: none;
    padding: 14px;
    font-size: 1.05rem;
    font-family: 'DejaVu Sans Mono', monospace;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 10px;
    font-weight: bold;
  }
  #submitBtn:hover { background: #5CE6D5; }
  #submitBtn:disabled { background: #33384A; color: #7A8093; cursor: not-allowed; }
  #resultBox {
    display: none;
    background: #171A24;
    border: 1.5px solid #262A38;
    border-radius: 6px;
    padding: 24px 20px;
    text-align: center;
    margin-bottom: 20px;
  }
  #resultBox h2 { color: var(--primary); margin-top: 0; }
  #scoreCircle {
    font-size: 2.2rem;
    font-weight: 800;
    color: #2DD4BF;
    font-family: 'DejaVu Sans Mono', monospace;
  }
  #retryBtn {
    background: #2DD4BF;
    color: #0F1117;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
    font-size: 0.95rem;
    font-weight: bold;
  }
  .explain {
    font-size: 0.85rem;
    color: #A7ADBB;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed #33384A;
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>Представление, измерение и кодирование информации. Логические основы компьютера</h1>
  <p>Тест по информатике &middot; 11 класс &middot; подготовка к ЕНТ</p>
  <p style="margin-top:4px; font-size:0.78rem; letter-spacing:1px; text-transform:uppercase; opacity:0.8;">by Azamat</p>
</header>

<div class="container">

  <div class="progress-wrap">
    <div style="display:flex; justify-content:space-between; font-size:0.85rem; color:#555;">
      <span>Отвечено: <span id="answeredCount">0</span> из <span id="totalCount">0</span></span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <div id="resultBox">
    <h2>Результат теста</h2>
    <div id="scoreCircle">0 / 0</div>
    <p id="scoreMsg"></p>
    <button id="retryBtn" onclick="resetQuiz()">Пройти заново</button>
  </div>

  <div id="quizForm"></div>

  <button id="submitBtn" onclick="checkAnswers()">Проверить ответы</button>

</div>

<script src="progress.js"></script>
<script>
const questions = [
  {
    q: "Наименьшая единица измерения информации:",
    options: ["Байт", "Бит", "Килобайт", "Символ"],
    correct: [1],
    explain: "Бит (binary digit) - наименьшая единица измерения информации: 0 или 1."
  },
  {
    q: "Сколько бит в 16 байтах?",
    options: ["2", "64", "128", "256"],
    correct: [2],
    explain: "16 байт × 8 = 128 бит."
  },
  {
    q: "По формуле Хартли N = 2^i буква N обозначает:",
    options: ["объём информации", "мощность алфавита", "число символов в тексте", "вес одного бита"],
    correct: [1],
    explain: "N - мощность алфавита (число символов в алфавите), i - информационный вес символа."
  },
  {
    q: "Мощность алфавита 32. Каков информационный вес одного символа?",
    options: ["4 бита", "5 бит", "6 бит", "32 бита"],
    correct: [1],
    explain: "32 = 2^5, значит информационный вес символа равен 5 битам."
  },
  {
    q: "Своевременно полученная и ещё не устаревшая информация обладает свойством:",
    options: ["точность", "полнота", "актуальность", "доступность"],
    correct: [2],
    explain: "Актуальность - своевременность получения информации; устаревшая информация становится неактуальной."
  },
  {
    q: "Система счисления, в которой значение цифры зависит от её позиции в числе:",
    options: ["непозиционная", "римская", "позиционная", "алфавитная"],
    correct: [2],
    explain: "В позиционной системе счисления значение цифры зависит от её места (разряда) в числе."
  },
  {
    q: "Сколько цифр используется в восьмеричной системе счисления?",
    options: ["2", "6", "8", "16"],
    correct: [2],
    explain: "В восьмеричной системе используются цифры от 0 до 7, то есть 8 цифр."
  },
  {
    q: "Чему равно двоичное число 1010 в десятичной системе?",
    options: ["8", "9", "10", "12"],
    correct: [2],
    explain: "1010(2) = 1×8 + 0×4 + 1×2 + 0×1 = 10(10)."
  },
  {
    q: "Чтобы перевести число из двоичной в восьмеричную систему, двоичное число разбивают на группы по:",
    options: ["2 цифры", "3 цифры", "4 цифры", "8 цифр"],
    correct: [1],
    explain: "Для перевода в восьмеричную систему двоичное число делят на триады (группы по 3 цифры)."
  },
  {
    q: "Чему равно десятичное число 26 в шестнадцатеричной системе?",
    options: ["1A", "1B", "2A", "16"],
    correct: [0],
    explain: "26 : 16 = 1, остаток 10 (A). Значит 26(10) = 1A(16)."
  },
  {
    q: "Стандартная таблица ASCII (коды 0-127) использует:",
    options: ["7 бит", "8 бит", "16 бит", "32 бита"],
    correct: [0],
    explain: "Изначально ASCII кодировала символы 7 битами (2^7 = 128 символов), позже расширили до 8 бит."
  },
  {
    q: "Кодировка, отводящая 2 байта на символ и позволяющая записывать почти любой язык мира:",
    options: ["ASCII", "Unicode", "КОИ-8", "Windows-1251"],
    correct: [1],
    explain: "Unicode отводит 2 байта (16 бит) на символ: 2^16 = 65536 комбинаций."
  },
  {
    q: "Кто считается основателем алгебры логики (булевой алгебры)?",
    options: ["Аристотель", "Джордж Буль", "Ральф Хартли", "Джон фон Нейман"],
    correct: [1],
    explain: "Джордж Буль в середине XIX века создал алгебру логики, отец математической логики."
  },
  {
    q: "Логическая операция «логическое умножение»:",
    options: ["дизъюнкция", "инверсия", "конъюнкция", "импликация"],
    correct: [2],
    explain: "Конъюнкция (И) - логическое умножение, истина только при истинности обоих операндов."
  },
  {
    q: "Результат операции дизъюнкции ложен только тогда, когда:",
    options: ["оба операнда истинны", "оба операнда ложны", "один из операндов ложен", "хотя бы один операнд истинен"],
    correct: [1],
    explain: "Дизъюнкция (ИЛИ) ложна только когда оба операнда ложны, во всех остальных случаях истинна."
  },
  {
    q: "Число строк в таблице истинности для выражения с 3 переменными:",
    options: ["3", "6", "8", "9"],
    correct: [2],
    explain: "Число строк m = 2^n = 2^3 = 8."
  },
  {
    q: "Приоритет выполнения логических операций (от первого к последнему):",
    options: ["дизъюнкция, конъюнкция, отрицание, скобки", "скобки, отрицание, конъюнкция, дизъюнкция", "отрицание, скобки, дизъюнкция, конъюнкция", "конъюнкция, дизъюнкция, скобки, отрицание"],
    correct: [1],
    explain: "Порядок выполнения: 1) скобки, 2) отрицание, 3) конъюнкция, 4) дизъюнкция."
  },
  {
    q: "Логический элемент с одним входом и одним выходом:",
    options: ["конъюнктор", "дизъюнктор", "инвертор", "сумматор"],
    correct: [2],
    explain: "Инвертор (НЕ) имеет один вход и один выход, меняет сигнал на противоположный."
  },
  {
    q: "Единицы измерения информации, идущие по возрастанию (выберите все верные):",
    options: ["бит", "байт", "килобайт", "мегабайт", "метр"],
    correct: [0,1,2,3],
    explain: "Бит, байт, килобайт, мегабайт - единицы измерения информации. Метр - единица длины, сюда не относится.",
    multi: true
  },
  {
    q: "Свойства информации (выберите все верные):",
    options: ["достоверность", "актуальность", "полнота", "громкость", "ясность"],
    correct: [0,1,2,4],
    explain: "Достоверность, актуальность, полнота и ясность - свойства информации. Громкость - характеристика звука, а не информации.",
    multi: true
  }
];
const form = document.getElementById('quizForm');
const totalCountEl = document.getElementById('totalCount');
totalCountEl.textContent = questions.length;

function renderQuiz() {
  form.innerHTML = '';
  questions.forEach((item, qi) => {
    const div = document.createElement('div');
    div.className = 'question';
    div.dataset.qi = qi;
    const letters = ['A','B','C','D','E','F'];
    let optsHtml = '';
    item.options.forEach((opt, oi) => {
      const inputType = item.multi ? 'checkbox' : 'radio';
      optsHtml += `<label class="option" data-oi="${oi}">
        <input type="${inputType}" name="q${qi}" value="${oi}" onchange="selectOption(${qi}, ${oi}, this)">
        ${letters[oi]}) ${opt}
      </label>`;
    });
    div.innerHTML = `
      <div class="qtext"><span class="qnum">${qi+1}.</span>${item.q}
        ${item.multi ? '<span class="multi-hint">(несколько верных ответов)</span>' : ''}
      </div>
      ${optsHtml}
      <div class="explain" id="explain${qi}">${item.explain}</div>
    `;
    form.appendChild(div);
  });
}

const userAnswers = {};

function selectOption(qi, oi, inputEl) {
  const qDiv = form.querySelector(`[data-qi="${qi}"]`);
  const isMulti = questions[qi].multi;
  if (!userAnswers[qi]) userAnswers[qi] = new Set();

  if (isMulti) {
    if (inputEl.checked) userAnswers[qi].add(oi);
    else userAnswers[qi].delete(oi);
    if (userAnswers[qi].size === 0) delete userAnswers[qi];
  } else {
    userAnswers[qi] = new Set([oi]);
  }

  qDiv.querySelectorAll('.option').forEach(optLabel => {
    const optOi = parseInt(optLabel.dataset.oi);
    const input = optLabel.querySelector('input');
    optLabel.classList.toggle('selected', input.checked);
  });

  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(userAnswers).length;
  document.getElementById('answeredCount').textContent = answered;
  const pct = Math.round((answered / questions.length) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
}

function checkAnswers() {
  let score = 0;
  questions.forEach((item, qi) => {
    const qDiv = form.querySelector(`[data-qi="${qi}"]`);
    const userSet = userAnswers[qi] || new Set();
    const correctSet = new Set(item.correct);
    const isCorrect = userSet.size === correctSet.size && [...userSet].every(v => correctSet.has(v));
    if (isCorrect) score++;

    qDiv.querySelectorAll('.option').forEach(optLabel => {
      const oi = parseInt(optLabel.dataset.oi);
      const input = optLabel.querySelector('input');
      input.disabled = true;
      if (correctSet.has(oi)) optLabel.classList.add('correct');
      else if (userSet.has(oi)) optLabel.classList.add('wrong');
    });
    document.getElementById('explain' + qi).style.display = 'block';
  });

  document.getElementById('submitBtn').style.display = 'none';
  const resultBox = document.getElementById('resultBox');
  resultBox.style.display = 'block';
  document.getElementById('scoreCircle').textContent = score + ' / ' + questions.length;
  const pct = Math.round((score / questions.length) * 100);
  let msg = '';
  if (pct >= 85) msg = 'Отличный результат! Тема усвоена.';
  else if (pct >= 60) msg = 'Хороший результат, но стоит повторить некоторые вопросы.';
  else msg = 'Рекомендуется повторить тему и пройти тест ещё раз.';
  const saved = (typeof EduConProgress !== 'undefined')
    ? EduConProgress.recordResult('tema2', 'Представление, измерение и кодирование информации. Логические основы компьютера', score, questions.length)
    : null;
  let bestMsg = '';
  if (saved && saved.isNewBest) bestMsg = ' \uD83C\uDFC6 Новый личный рекорд!';
  document.getElementById('scoreMsg').textContent = msg + ` (${pct}%)` + bestMsg;
  resultBox.scrollIntoView({behavior: 'smooth'});
}

function resetQuiz() {
  for (const key in userAnswers) delete userAnswers[key];
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('submitBtn').style.display = 'block';
  updateProgress();
  renderQuiz();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

renderQuiz();
if (typeof EduConProgress !== 'undefined') { EduConProgress.ensureNickname(); }
</script>

</body>
</html>
